name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey -keypass android -storepass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Extract app version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | grep -oP '"\K[^"]+')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Rename APK with version
        run: |
          cp app/build/outputs/apk/release/app-release.apk "OpenWrt-MGR-${VERSION}.apk"
          ls -lh *.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-MGR-APK
          path: OpenWrt-MGR-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenWrt-MGR-*.apk
          draft: false
          prerelease: false
          tag_name: ${{ format('v{0}', env.VERSION) }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
