name: Release OpenWrt-MGR
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create debug keystore for signing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias androiddebugkey -keypass android -storepass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Extract app version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -n1 | grep -oP '"\K[^"]+')
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "App version: ${VERSION}"

      - name: Rename APK with version
        run: |
          cp app/build/outputs/apk/release/app-release.apk "OpenWrt-MGR-${VERSION}.apk"
          ls -lh OpenWrt-MGR-*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-MGR-${{ env.VERSION }}
          path: OpenWrt-MGR-*.apk
          if-no-files-found: error

      # Create or update GitHub Release for versionName (re-runs of same version OK)
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          TITLE="OpenWrt-MGR ${VERSION}"
          shopt -s nullglob
          APKS=(OpenWrt-MGR-*.apk)
          if [ ${#APKS[@]} -eq 0 ]; then
            echo "APK not found"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} exists — replacing assets"
            gh release upload "$TAG" "${APKS[@]}" --clobber
            gh release edit "$TAG" --title "$TITLE" --latest
          else
            echo "Creating release ${TAG} at ${GITHUB_SHA}"
            # --target pins the release to this commit without a separate tag push loop
            gh release create "$TAG" "${APKS[@]}" \
              --title "$TITLE" \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              --latest
          fi

          echo "Release URL:"
          gh release view "$TAG" --json url -q .url
